<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background-color: #0B0F19;
      color: #F8FAFC;
    }
    .header {
      display: flex;
      items-center: center;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 1px solid #1E293B;
      padding-bottom: 8px;
    }
    .logo-text {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .accent {
      color: #14B8A6;
    }
    textarea {
      width: 105%;
      box-sizing: border-box;
      height: 80px;
      padding: 8px;
      background-color: #0F172A;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #F8FAFC;
      font-size: 11px;
      resize: none;
      outline: none;
      margin-left: -8px;
      margin-bottom: 12px;
    }
    textarea:focus {
      border-color: #14B8A6;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #14B8A6;
      border: none;
      border-radius: 8px;
      color: #FFF;
      font-weight: 700;
      cursor: pointer;
      font-size: 12px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #0D9488;
    }
    .result-box {
      margin-top: 14px;
      padding: 12px;
      background-color: #0F172A;
      border-radius: 8px;
      border: 1px solid #1E293B;
      display: none;
    }
    .risk-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .risk-score {
      font-size: 20px;
      font-weight: 800;
    }
    .risk-level {
      font-size: 10px;
      font-weight: 750;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .critical { color: #EF4444; background-color: rgba(239, 68, 68, 0.1); }
    .high { color: #F59E0B; background-color: rgba(245, 158, 11, 0.1); }
    .safe { color: #10B981; background-color: rgba(16, 185, 129, 0.1); }
    
    .flag-list {
      font-size: 10px;
      color: #94A3B8;
      padding-left: 14px;
      margin: 6px 0 0 0;
    }
    .flag-list li {
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:18px;">🛡️</span>
    <div class="logo-text">JobShield <span class="accent">AI</span></div>
  </div>

  <textarea id="textInput" placeholder="Paste suspicious job description, message, or email here to audit..."></textarea>
  <button id="scanBtn">Scan Content</button>

  <div id="resultBox" class="result-box">
    <div class="risk-meta">
      <div id="riskScore" class="risk-score">0%</div>
      <div id="riskLevel" class="risk-level">Safe</div>
    </div>
    <div style="font-size: 11px; font-weight: bold; margin-top: 8px;">Audit Findings:</div>
    <ul id="flagList" class="flag-list"></ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
